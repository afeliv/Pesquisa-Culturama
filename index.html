<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./img/culturama-favico.png">
    <title>Culturama</title>
</head>
<body>
    <header>
        <img src="./img/logo-culturama.png" alt="Logo culturama">
        <h1>Pesquisa Online</h1>
    </header>
    <section>
        
        
        <form action="" method="get">
            <fieldset>
                <legend>Dados Pessoais</legend>
        
                <label for="name">Nome:</label>
                <input id="name" type="text" name="userName" required>
                <br>
                <label for="age">Idade:</label>
                <input id="age" type="Number" name="userAge" min="12" max="100" required>
                <br>
                <label for="birthDate">Data de nascimento:</label>
                <input id="birthDate" type="Date" name="userBirthDate">
                <br>
                <label for="email">E-mail:</label>
                <input id="email"type="email" name="userEmail" required>
                <br>
                <label for="phone">Telefone:</label>
                <input id="phone" type="tel" name="userPhone" pattern="[0-9]{11}" placeholder="DDD + number">
                <br>
                <label for="image">Upload de Fotos:</label>
                <input id="image"type="file" accept="image/*" name="userImage">
                <br>
            </fieldset>
            <fieldset>
                <legend>Perfil</legend>

                <p> Gênero:</p>
                <input id="female" type="radio" name="userGender" value="Feminino">
                <label for="female">Feminino</label>

                <input id="male" type="radio" name="userGender" value="Masculino">
                <label for="male">Masculino</label>

                <input id="preferNotToSay" type="radio" name="userGender" value="Prefiro não dizer">
                <label for="preferNotToSay">Prefiro não dizer</label>

                <br>
                <br> 


                <label for="maritalStatus">Estado Civil:</label>
                <select id="maritalStatus" name="userMaritalStatus">
                    <option value="notInformed">Selecione</option>
                    <option value="Casado">Casado</option>
                    <option value="Solteiro">Solteiro</option>
                    <option value="Divorciado">Divorciado</option>
                    <option value="Viúvo">Viúvo</option>
                </select>
                <br>
                <br>
                <label for="userState">Estado:</label>
                    <select id="userState" name="isUserState" required>
                        <option value="notInformed">Selecione</option>

                        <option value="acre">Acre</option>
                        <option value="alagoas">Alagoas</option>
                        <option value="amapa">Amapá</option>
                        <option value="amazonas">Amazonas</option>
                        <option value="bahia">Bahia</option>
                        <option value="ceara">Ceará</option>
                        <option value="distrito-federal">Distrito Federal</option>
                        <option value="espirito-santo">Espírito Santo</option>
                        <option value="goias">Goiás</option>
                        <option value="maranhao">Maranhão</option>
                        <option value="mato-grosso-do-sul">Mato Grosso do Sul</option>
                        <option value="mato-grosso">Mato Grosso</option>
                        <option value="minas-gerais">Minas Gerais</option>
                        <option value="para">Pára</option>
                        <option value="paraiba">Paraíba</option>
                        <option value="parana">Paraná</option>
                        <option value="pernambuco">Pernambuco</option>
                        <option value="piaui">Piauí</option>
                        <option value="rio-de-janeiro">Rio de Janeiro</option>
                        <option value="rio-grande-do-norte">Rio Grande do Norte</option>
                        <option value="rio-grande-do-sul">Rio Grande do Sul</option>
                        <option value="rondônia">Rondônia</option>
                        <option value="roraima">Roraima</option>
                        <option value="santa-catarina">Santa Catarina</option>
                        <option value="sao-paulo">São Paulo</option>
                        <option value="sergipe">Sergipe</option>
                        <option value="tocantins">Tocantins</option>
                    </select>
                </label>

                <br>
                <br>

                <label for="city">Cidade:</label>
                <input id="city" type="text" name="userCity">
            </fieldset>
            <fieldset>
                <legend>Hábitos</legend>
                <p>Redes Sociais:</p>

                <input id="insta" type="checkbox" name="social" value="instagram">
                <label for="insta">Instagram</label>
                <br>
                <input id="face" type="checkbox" name="social" value="facebook">
                <label for="face">Facebook</label>
                <br>
                <input id="xSocial" type="checkbox" name="social" value="X">
                <label for="xSocial">X</label>
                <br>
                <input id="isLinkedin" type="checkbox" name="social" value="linkedin">
                <label for="isLinkedin">LinkedIn</label>

                <br>
                <br>

                <label for="musicStyle">Estilo Musical:</label>
                <input list="styleTypes" id="musicStyle" type="text" name="userMusicStyle">
                <datalist id="styleTypes">
                    <option value="Rock">
                    <option value="Samba">
                    <option value="Pagode">
                    <option value="Sertanejo">
                    <option value="Forró">
                </datalist>

                <br>
                <br>

                <label for="favoriteColor">Cor Favorita:</label>
                <input type="color" name="userFavoriteColor" id="favoriteColor">


            </fieldset>
            <fieldset>
                <legend> Deixe sua mensagem:</legend>
                <p for="texto-message">Avalie seu nível de satisfação:</p>
                <select id="message">
                    <option value="notInformed">Selecione</option>
                    <option value="1">1 - Muito insatisfeito</option>
                    <option value="2">2 - Insatisfeito</option>
                    <option value="3">3 - Neutro</option>
                    <option value="4">4 - Satisfeito</option>
                    <option value="5">5 - Muito satisfeito</option>
                </select>
                <br>
                <br>
                <label for="comment">Deixe um comentário:</label>
                <br>
                <textarea id="comment" name="text-box" id="id-textBox" placeholder="Digite sua mensagem aqui..."></textarea>
            </fieldset>

            <fieldset>
                <legend>Confirmações</legend>
                <input type="checkbox" name="userLgpd" id="userLgpdTerm" value="accepted" required>
                <label for="userLgpdTerm">Li e concordo com os termos de uso e privacidade.</label>

                <br>

                <input type="checkbox" name="userGetResult" id="getResult" value="accepted">
                <label for="getResult">Desejo receber os resultados da pesquisa.</label>

            </fieldset>


            <br>
            <button type="submit">Enviar</button>
            <button type="reset">Limpar</button>
        </form>
    </section>
</body>
</html>
